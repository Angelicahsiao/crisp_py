# crisp_py dev container (mirrors crisp_gym/docker-compose.yml).
#
#   NETWORK_INTERFACE=enp0s31f6 docker compose up -d crisp-py
#   docker exec -it crisp-py-humble bash
#
# The repo is bind-mounted via ~/workspace, so a sibling layout is expected:
#   ~/workspace/crisp_py        (this repo)
#   ~/workspace/crisp_gym       (optional, if co-developing)
# On first start the container runs `pixi install -e humble`; subsequent starts
# reuse the .pixi/envs cache on the host.
services:
  crisp-py:
    build:
      context: .
      dockerfile: Dockerfile
    image: crisp-py-pixi:humble
    container_name: crisp-py-humble
    volumes:
      - ~/workspace:/workspace
      - $HOME/.Xauthority:/root/.Xauthority
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
    environment:
      - QT_X11_NO_MITSHM=1
      - DISPLAY=$DISPLAY
      # Match crisp_gym so the two can discover each other on the same host.
      # NOTE: crisp_py's pixi activation (scripts/set_ros_env.sh) defaults
      # ROS_DOMAIN_ID to 100 when scripts/personal_ros_env.sh is absent; create
      # that file to pin a domain if you need it to differ from this value.
      - ROS_DOMAIN_ID=1
      - RCUTILS_COLORIZED_OUTPUT=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - NETWORK_INTERFACE=${NETWORK_INTERFACE:-enp0s31f6}
    network_mode: "host"
    stdin_open: true
    tty: true
    ipc: "host"
    pid: "host"
    privileged: true
    working_dir: /workspace/crisp_py
    command: >
      bash -c "
        if [ ! -d /workspace/crisp_py/.pixi/envs/humble ]; then pixi install -e humble; fi &&
        exec bash"
